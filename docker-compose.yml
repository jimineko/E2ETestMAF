services:
  e2e:
    platform: linux/amd64
    build: .
    init: true
    cap_drop:
      - ALL
    security_opt:
      - seccomp=unconfined
    env_file:
      - path: .env
        required: false
    environment:
      MAF_E2E_RUNTIME_ENVIRONMENT: container
      MAF_E2E_CODEACT_MODE: ${MAF_E2E_CODEACT_MODE:-auto}
      MAF_E2E_CODEACT_REQUIRE_KVM: ${MAF_E2E_CODEACT_REQUIRE_KVM:-true}
      MAF_E2E_PLAYWRIGHT_HEADLESS: ${MAF_E2E_COMPOSE_HEADLESS:-true}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - e2e-artifacts:/app/artifacts
      - e2e-checkpoints:/app/checkpoints
      - e2e-auth:/app/auth
    shm_size: 2gb

volumes:
  e2e-artifacts:
  e2e-checkpoints:
  e2e-auth:
